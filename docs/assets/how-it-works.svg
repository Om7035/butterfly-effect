  <circle cx="106" cy="176" r="14" fill="#7c3aed"/>
  <text x="234" y="172" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <circle cx="234" cy="166" r="14" fill="#7c3aed"/>
  <path d="M106 167 L108.2 173.8 L115 176 L108.2 178.2 L106 185 L103.8 178.2 L97 176 L103.8 173.8 Z" fill="#ffffff"/>
