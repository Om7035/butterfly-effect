<svg width="1480" height="725" viewBox="0 0 1480 725" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1480" height="725" fill="#ffffff"/>

  <!-- Header -->
  <g>
    <path d="M60 36 C52 26, 38 22, 36 30 C34 38, 44 42, 60 36Z" fill="#7c3aed" opacity="0.75"/>
    <path d="M60 36 C68 26, 82 22, 84 30 C86 38, 76 42, 60 36Z" fill="#7c3aed" opacity="0.75"/>
    <path d="M60 36 C52 42, 44 48, 46 54 C48 60, 56 56, 60 36Z" fill="#7c3aed" opacity="0.45"/>
    <path d="M60 36 C68 42, 76 48, 74 54 C72 60, 64 56, 60 36Z" fill="#7c3aed" opacity="0.45"/>
    <line x1="60" y1="20" x2="60" y2="52" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>

    <text x="100" y="46" font-size="27" font-weight="800" letter-spacing="-0.01em" fill="#1e1b2e">butterfly-effect</text>
    <text x="100" y="67" font-size="12.5" fill="#64748b">Type an event. Get the causal chain — 8 stages</text>

    <rect x="1300" y="22" width="120" height="27" rx="13.5" fill="#f5f3ff" stroke="#ddd6fe"/>
