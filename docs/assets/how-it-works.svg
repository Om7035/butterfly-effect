  <g filter="url(#cardShadow)">
    <rect x="70" y="140" width="260" height="140" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="70" y="140" width="260" height="5" rx="2.5" fill="#7c3aed"/>
