  <text x="94" y="458" font-size="16" font-weight="700" fill="#1e293b">Causal Chain</text>
  <text x="94" y="480" font-size="12" fill="#64748b">explainable output +</text>
  <text x="94" y="497" font-size="12" fill="#64748b">intervals, alt. chains</text>

