<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" width="100%" role="img" aria-labelledby="pl-title pl-desc">
  <title id="pl-title">butterfly-effect algorithms</title>
  <desc id="pl-desc">The four core algorithms behind the causal chain: NER entity extraction, cycle detection with damping, confidence compounding down a chain, and synthetic control for validation.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .head    { font-family: -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .sub     { font-family: -apple-system, "Segoe UI", sans-serif; font-size: 11.5px; fill: #64748b; }
      .panel-t { font-family: -apple-system, "Segoe UI", sans-serif; font-size: 12.5px; font-weight: 700; fill: #334155; }
      .mono    { font-family: "SF Mono", Consolas, monospace; font-size: 13px; fill: #0f172a; }
      .mono-d  { font-family: "SF Mono", Consolas, monospace; font-size: 11px; fill: #94a3b8; }
      .small   { font-family: -apple-system, "Segoe UI", sans-serif; font-size: 10.5px; fill: #64748b; }
      .panel   { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1px; }
    </style>
  </defs>

  <rect width="1100" height="480" fill="#ffffff" rx="12"/>

  <text x="32" y="34" class="head">How the causal chain is built</text>
  <text x="32" y="52" class="sub">four algorithms, run on every analysis</text>

  <!-- Panel 1: NER -->
  <g transform="translate(32,72)">
    <rect width="500" height="180" rx="10" class="panel"/>
    <text x="18" y="28" class="panel-t">1. Entity extraction (spaCy NER)</text>
    <text x="18" y="52" class="mono-d">"Fed raised rates 75bps, said Chair Powell"</text>

    <g transform="translate(18,68)">
      <rect x="0" y="0" width="32" height="20" rx="3" fill="#ede9fe" stroke="#c4b5fd"/>
      <text x="16" y="14" text-anchor="middle" font-family="SF Mono, monospace" font-size="9.5" fill="#6d28d9">Fed</text>
      <text x="16" y="32" text-anchor="middle" class="small">ORG</text>

      <rect x="48" y="0" width="50" height="20" rx="3" fill="#fef3c7" stroke="#fde68a"/>
      <text x="73" y="14" text-anchor="middle" font-family="SF Mono, monospace" font-size="9.5" fill="#92400e">75bps</text>
      <text x="73" y="32" text-anchor="middle" class="small">PERCENT</text>

      <rect x="114" y="0" width="58" height="20" rx="3" fill="#d1fae5" stroke="#6ee7b7"/>
      <text x="143" y="14" text-anchor="middle" font-family="SF Mono, monospace" font-size="9.5" fill="#065f46">Powell</text>
      <text x="143" y="32" text-anchor="middle" class="small">PERSON</text>

      <rect x="188" y="0" width="280" height="20" rx="3" fill="#fee2e2" stroke="#fca5a5" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="328" y="14" text-anchor="middle" font-family="SF Mono, monospace" font-size="9.5" fill="#991b1b">"GPE Grant Agreement.pdf"</text>
      <text x="328" y="32" text-anchor="middle" class="small">filtered — document metadata</text>
    </g>

    <text x="18" y="138" class="small">Document-metadata filter removes PDF titles and</text>
    <text x="18" y="152" class="small">filenames so junk entities never enter the graph.</text>
    <line x1="18" y1="160" x2="482" y2="160" stroke="#f1f5f9"/>
    <text x="18" y="174" class="mono-d">butterfly/api/analyze.py · _evidence_to_nodes()</text>
  </g>

  <!-- Panel 2: Confidence compounding -->
  <g transform="translate(552,72)">
    <rect width="516" height="180" rx="10" class="panel"/>
    <text x="18" y="28" class="panel-t">2. Confidence compounds down the chain</text>

    <text x="18" y="62" class="mono">0.90 × 0.85 × 0.75 × 0.70</text>
    <text x="18" y="86" class="mono" font-weight="700" fill="#7c3aed">= 0.40 joint confidence</text>
    <rect x="14" y="68" width="0" height="22" fill="#ede9fe" opacity="0.5">
      <animate attributeName="width" values="0;230;230;0" keyTimes="0;0.4;0.85;1" dur="4s" repeatCount="indefinite"/>
    </rect>

    <g transform="translate(18,108)">
      <line x1="0" y1="40" x2="460" y2="40" stroke="#e2e8f0"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#e2e8f0"/>
      <rect x="0" y="4" width="115" height="36" fill="#7c3aed" opacity="0.85"/>
      <rect x="115" y="9" width="115" height="31" fill="#7c3aed" opacity="0.65"/>
      <rect x="230" y="16" width="115" height="24" fill="#7c3aed" opacity="0.45"/>
      <rect x="345" y="22" width="115" height="18" fill="#7c3aed" opacity="0.28"/>
      <text x="57" y="54" text-anchor="middle" class="small">hop 1 · 90%</text>
      <text x="172" y="54" text-anchor="middle" class="small">hop 2 · 77%</text>
      <text x="287" y="54" text-anchor="middle" class="small">hop 3 · 57%</text>
      <text x="402" y="54" text-anchor="middle" class="small">hop 4 · 40%</text>
    </g>

    <line x1="18" y1="160" x2="498" y2="160" stroke="#f1f5f9"/>
    <text x="18" y="174" class="mono-d">multiplied, never added — long chains decay fast</text>
  </g>

  <!-- Panel 3: Cycle detection -->
  <g transform="translate(32,268)">
    <rect width="500" height="180" rx="10" class="panel"/>
    <text x="18" y="28" class="panel-t">3. Cycle detection + damping</text>

    <g transform="translate(120,104)">
      <circle cx="-60" cy="-30" r="4" fill="#f59e0b"/>
      <circle cx="25" cy="-34" r="4" fill="#f59e0b"/>
      <circle cx="55" cy="18" r="4" fill="#f59e0b"/>
      <circle cx="-32" cy="26" r="4" fill="#f59e0b"/>
      <path d="M -60 -30 Q -20 -48 25 -34 Q 50 -12 55 18 Q 15 38 -32 26 Q -72 4 -60 -30"
            fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="5 5" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="240" to="0" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <text x="-60" y="-42" text-anchor="middle" class="small">Fed hike</text>
      <text x="25" y="-44" text-anchor="middle" class="small">Recession</text>
      <text x="68" y="22" text-anchor="middle" class="small">Fed cuts</text>
      <text x="-32" y="44" text-anchor="middle" class="small">Recovery</text>
    </g>

    <g transform="translate(280,80)">
      <text x="0" y="0" class="mono-d">unrolled with 70% damping:</text>
      <text x="0" y="20" class="mono" font-size="12">100% → 70% → 49% → 34%</text>
    </g>

    <line x1="18" y1="160" x2="482" y2="160" stroke="#f1f5f9"/>
    <text x="18" y="174" class="mono-d">butterfly/causal/cycle_detector.py · find_cycles()</text>
  </g>

  <!-- Panel 4: Synthetic control -->
  <g transform="translate(552,268)">
    <rect width="516" height="180" rx="10" class="panel"/>
    <text x="18" y="28" class="panel-t">4. Synthetic control (validation)</text>
    <text x="18" y="48" class="small">SLSQP-optimized weights across control units</text>

    <g transform="translate(30,64)" font-family="-apple-system,sans-serif">
      <g transform="translate(0,0)">
        <rect width="30" height="58" y="22" fill="#e2e8f0" rx="2"/>
        <text x="15" y="96" text-anchor="middle" class="small">C1</text>
        <text x="15" y="16" text-anchor="middle" class="small">0.12</text>
      </g>
      <g transform="translate(48,0)">
        <rect width="30" height="38" y="42" fill="#e2e8f0" rx="2"/>
        <text x="15" y="96" text-anchor="middle" class="small">C2</text>
        <text x="15" y="36" text-anchor="middle" class="small">0.08</text>
      </g>
      <g transform="translate(96,0)">
        <rect width="30" height="70" y="10" fill="#7c3aed" rx="2"/>
        <text x="15" y="96" text-anchor="middle" class="small">C3</text>
        <text x="15" y="4" text-anchor="middle" class="small" fill="#7c3aed" font-weight="700">0.61</text>
      </g>
      <g transform="translate(144,0)">
        <rect width="30" height="20" y="60" fill="#e2e8f0" rx="2"/>
        <text x="15" y="96" text-anchor="middle" class="small">C4</text>
        <text x="15" y="54" text-anchor="middle" class="small">0.19</text>
      </g>
      <line x1="-8" y1="80" x2="200" y2="80" stroke="#e2e8f0"/>
      <text x="230" y="50" class="mono" font-size="13" fill="#7c3aed">R² = 0.87</text>
      <text x="230" y="68" class="small">pre-treatment fit ≥ 0.80</text>
      <text x="230" y="82" class="small">→ trustworthy</text>
    </g>

    <line x1="18" y1="160" x2="498" y2="160" stroke="#f1f5f9"/>
    <text x="18" y="174" class="mono-d">butterfly/causal/synthetic_control.py · Abadie &amp; Gardeazabal (2003)</text>
  </g>
</svg>
